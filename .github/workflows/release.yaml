name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  GITOPS_REPO: Branchenprimus/auto-app-deploy
  GITOPS_BRANCH: main
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Read app metadata
        id: app
        uses: mikefarah/yq@v4.44.3
        with:
          cmd: |
            echo "name=$(yq '.name' app.yaml)" >> "$GITHUB_OUTPUT"
            echo "image=$(yq '.image.repository' app.yaml)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.app.outputs.image }}:${{ github.ref_name }}

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: ${{ env.GITOPS_BRANCH }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update app values
        uses: mikefarah/yq@v4.44.3
        with:
          cmd: |
            mkdir -p gitops/apps
            cp app.yaml "gitops/apps/${{ steps.app.outputs.name }}.yaml"
            yq -i '.namespace = "apps"' "gitops/apps/${{ steps.app.outputs.name }}.yaml"
            yq -i '.image.tag = "${{ github.ref_name }}"' "gitops/apps/${{ steps.app.outputs.name }}.yaml"
            yq -i '.image.pullPolicy = "IfNotPresent"' "gitops/apps/${{ steps.app.outputs.name }}.yaml"

      - name: Commit GitOps change
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "apps/${{ steps.app.outputs.name }}.yaml"
          git commit -m "Deploy ${{ steps.app.outputs.name }} ${{ github.ref_name }}" || exit 0
          git push origin "${{ env.GITOPS_BRANCH }}"
